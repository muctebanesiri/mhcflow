name: ci

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/ci.yml"
  pull_request:
    branches:
      - main
    paths:
      - "src/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

jobs:
  mypy:
    name: run mypy with Python ${{ matrix.py }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        py: ["3.14", "3.13", "3.12", "3.11", "3.10"]
        os: ["ubuntu-latest"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python ${{ matrix.py }}
        run: uv python install ${{ matrix.py }}

      - name: Sync dependencies
        run: uv sync --locked --dev

      - name: Run mypy
        run: uv run mypy src/mhcflow
